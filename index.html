<!-- Contenu descriptif pour moteurs de recherche (sans JavaScript) -->
<noscript>
  <section>
    <h2>Accordo — Free Online Guitar &amp; Bass Tuner</h2>
    <p>Accordo is a free, accurate chromatic tuner for 6, 7 and 8-string guitars and 4, 5 and 6-string basses.
      It offers more than 50 tunings (Standard, Drop D, Drop C, Drop B, Open G, Open D, DADGAD, All Fourths…),
      a flat switch, reference tones to tune by ear, and automatic string detection — with no ads and no tracking.
      JavaScript is required to use the tuner.</p>
  </section>
</noscript>

<div id="app" class="app" hidden>

  <!-- En-tête : titre + calibration -->
  <header class="topbar">
    <div class="brand">Accordo</div>
    <div class="topbar-right">
      <button id="langBtn" class="lang-btn" aria-label="Langue" aria-haspopup="dialog" aria-expanded="false">FR</button>
      <div class="calib" role="group" aria-label="Calibration">
        <button id="calibDown" class="calib-btn" aria-label="Diminuer la fréquence de référence">−</button>
        <span id="calibValue" class="calib-value" aria-live="polite">440 Hz</span>
        <button id="calibUp" class="calib-btn" aria-label="Augmenter la fréquence de référence">+</button>
      </div>
    </div>
  </header>

  <!-- Guitare / Basse -->
  <div class="segmented" role="tablist" aria-label="Instrument">
    <button id="segGuitar" class="seg active" role="tab" aria-selected="true">Guitare</button>
    <button id="segBass" class="seg" role="tab" aria-selected="false">Basse</button>
  </div>

  <!-- Sélecteur de preset -->
  <button id="presetBtn" class="preset-btn" aria-haspopup="dialog" aria-expanded="false">
    <span id="presetLabel">Standard E · 6 cordes</span>
    <svg width="14" height="14" viewBox="0 0 16 16" aria-hidden="true" focusable="false"><path d="M4 6l4 4 4-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>

  <!-- Cadran -->
  <div class="gauge-card">
    <svg id="gauge" viewBox="0 0 300 178" class="gauge" aria-hidden="true" focusable="false">
      <g id="ticks"></g>
      <path id="zoneArc" d="" class="zone-arc"/>
      <g id="needle">
        <line x1="150" y1="98" x2="150" y2="34" class="needle-line"/>
      </g>
      <text x="38"  y="172" class="gauge-minus">♭</text>
      <text x="262" y="172" class="gauge-plus">♯</text>
    </svg>
    <div class="note-display">
      <div id="noteName" class="note-name">–</div>
      <div class="note-meta">
        <span id="centsLabel" class="cents">&nbsp;</span>
        <span id="freqLabel" class="freq">&nbsp;</span>
      </div>
      <div id="statusText" class="status" role="status" aria-live="polite">Jouez une corde…</div>
    </div>
  </div>

  <!-- Cordes -->
  <div id="stringsRow" class="strings" role="group"></div>

  <!-- Boutons du bas -->
  <footer class="controls">
    <button id="flatBtn" class="ctrl">
      <span class="ctrl-icon">♭</span><span id="flatLabel" class="ctrl-label">Flat</span>
    </button>
    <button id="autoBtn" class="ctrl active">
      <span class="ctrl-icon">A</span><span id="autoLabel" class="ctrl-label">Auto</span>
    </button>
    <button id="soundBtn" class="ctrl">
      <span class="ctrl-icon">🔊</span><span id="soundLabel" class="ctrl-label">Son</span>
    </button>
  </footer>

  <div id="micBanner" class="mic-banner" role="alert" hidden>
    <span id="micBannerText">Micro non autorisé — utilisez le mode Son et accordez à l'oreille.</span>
    <button id="micRetry" class="mic-retry">Réessayer</button>
  </div>
</div>

<!-- Feuille de sélection des accordages -->
<div id="presetSheet" class="overlay sheet-overlay" hidden>
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
    <div class="sheet-head">
      <span id="sheetTitle">Accordages</span>
      <button id="sheetClose" class="sheet-close" aria-label="Fermer">✕</button>
    </div>
    <div class="sheet-search">
      <input id="presetSearch" type="search" inputmode="search" autocomplete="off"
             placeholder="Rechercher : Drop C, Open G, DADGAD…">
    </div>
    <div class="custom-actions-bar">
      <button id="createCustomBtn" class="custom-create-btn">+ Custom</button>
      <div class="custom-import-bar">
        <input id="customImportInput" type="text" inputmode="text" autocomplete="off"
               placeholder="Paste a share code...">
        <button id="customImportBtn" class="custom-import-btn">Import</button>
      </div>
    </div>
    <div id="presetList" class="sheet-list"></div>
  </div>
</div>

<!-- Feuille de sélection de la langue -->
<div id="langSheet" class="overlay sheet-overlay" hidden>
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="langTitle">
    <div class="sheet-head">
      <span id="langTitle">Langue</span>
      <button id="langClose" class="sheet-close" aria-label="Fermer">✕</button>
    </div>
    <div id="langList" class="sheet-list"></div>
  </div>
</div>


<!-- Feuille de creation d'accordage personnalise -->
<div id="customSheet" class="overlay sheet-overlay" hidden>
  <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="customSheetTitle">
    <div class="sheet-head">
      <span id="customSheetTitle">Custom Tuning</span>
      <button id="customSheetClose" class="sheet-close" aria-label="Close">&times;</button>
    </div>
    <div class="custom-name-row">
      <input id="customNameInput" type="text" inputmode="text" autocomplete="off"
             placeholder="Tuning name...">
    </div>
    <div id="customStringsContainer" class="custom-strings"></div>
    <div class="custom-add-row">
      <button id="customAddLow" class="custom-add-btn">+ Add low string</button>
      <button id="customAddHigh" class="custom-add-btn">+ Add high string</button>
    </div>
    <div class="custom-footer">
      <button id="customSaveBtn" class="btn-primary custom-save-btn">Save</button>
      <div id="customShareDisplay" class="custom-share" hidden>
        <span id="customShareLabel" class="custom-share-label">Code:</span>
        <input id="customShareCodeInput" type="text" readonly class="custom-share-input">
        <button id="customShareCopy" class="custom-share-copy">Copy</button>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
<button id="updateBtn" class="update-banner" hidden></button>
<div id="srAnnounce" class="sr-only" role="status" aria-live="polite"></div>

<script src="js/i18n.js"></script>
<script src="js/music.js"></script>
<script src="js/share-code.js"></script>
<script src="js/settings-store.js"></script>
<script src="js/audio-engine.js"></script>
<script src="js/ui.js"></script>
<script src="js/custom-tunings.js"></script>
<script src="js/app.js"></script>
</body>
</html>
